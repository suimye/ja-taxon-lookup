<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self'">
  <title>日本語名 → 種名・英名・Taxid 検索</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      background: #f5f5f7;
      color: #1d1d1f;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #1d1d1f;
      color: #fff;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    /* ---- LEFT PANEL ---- */
    .panel-left {
      width: 260px;
      min-width: 200px;
      background: #fff;
      border-right: 1px solid #d2d2d7;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
      flex-shrink: 0;
    }

    .panel-left label {
      font-size: 12px;
      font-weight: 600;
      color: #6e6e73;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #input-area {
      flex: 1;
      resize: none;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      padding: 10px;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.6;
      outline: none;
      color: #1d1d1f;
    }

    #input-area:focus {
      border-color: #0071e3;
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.2);
    }

    #run-btn {
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #run-btn:hover:not(:disabled) { background: #0077ed; }
    #run-btn:disabled { background: #a1c4f0; cursor: not-allowed; }

    #clear-btn {
      background: none;
      color: #6e6e73;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      padding: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #clear-btn:hover { background: #f5f5f7; }

    .status-box {
      background: #f5f5f7;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      color: #6e6e73;
      line-height: 1.5;
      min-height: 44px;
    }

    .progress-bar-wrap {
      background: #e5e5ea;
      border-radius: 4px;
      height: 4px;
      overflow: hidden;
    }

    .progress-bar {
      background: #0071e3;
      height: 100%;
      width: 0%;
      transition: width 0.3s;
    }

    /* ---- RIGHT PANEL ---- */
    .panel-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .table-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: #fff;
      border-bottom: 1px solid #d2d2d7;
      flex-shrink: 0;
    }

    .table-toolbar span {
      font-size: 12px;
      color: #6e6e73;
      margin-right: auto;
    }

    .btn-secondary {
      background: none;
      border: 1px solid #d2d2d7;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      color: #1d1d1f;
      transition: background 0.15s;
    }

    .btn-secondary:hover:not(:disabled) { background: #f5f5f7; }
    .btn-secondary:disabled { color: #c7c7cc; cursor: not-allowed; }

    .table-wrap {
      flex: 1;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f5f5f7;
    }

    th {
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      color: #6e6e73;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid #d2d2d7;
      white-space: nowrap;
    }

    td {
      padding: 9px 14px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: top;
      word-break: break-all;
    }

    tr:nth-child(even) td { background: #fafafa; }

    tr.loading td { color: #6e6e73; font-style: italic; }

    .na { color: #c7c7cc; }

    .empty-state {
      text-align: center;
      color: #6e6e73;
      padding: 60px 20px;
      font-size: 14px;
    }

    .col-ja   { min-width: 120px; }
    .col-sci  { min-width: 180px; font-style: italic; }
    .col-png  { min-width: 180px; font-family: monospace; font-size: 12px; }
    .col-en   { min-width: 160px; }
    .col-tax  { min-width: 80px; }
  </style>
</head>
<body>

<header>日本語名 → 種名・英名・Taxid 検索</header>

<div class="main">

  <!-- Left: Input -->
  <div class="panel-left">
    <label>日本語名（1行1件）</label>
    <textarea id="input-area" placeholder="例：&#10;タヌキ&#10;キツネ&#10;ニホンザル"></textarea>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="status-box" id="status">入力欄に日本語名を入力してください。</div>
    <button id="run-btn">検索実行</button>
    <button id="clear-btn">クリア</button>
  </div>

  <!-- Right: Results -->
  <div class="panel-right">
    <div class="table-toolbar">
      <span id="result-count">結果: 0 件</span>
      <button class="btn-secondary" id="copy-btn" disabled>TSVをコピー</button>
      <button class="btn-secondary" id="save-btn" disabled>TSVを保存</button>
    </div>
    <div class="table-wrap">
      <table id="result-table">
        <thead>
          <tr>
            <th class="col-ja">日本語名</th>
            <th class="col-sci">種名</th>
            <th class="col-png">png名</th>
            <th class="col-en">英名</th>
            <th class="col-tax">Taxid</th>
          </tr>
        </thead>
        <tbody id="result-body">
          <tr class="loading"><td colspan="5" class="empty-state">まだ検索が実行されていません。</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="renderer.js"></script>
</body>
</html>
